name: championship
on:
  push:
    branches: [ "main" ]

jobs:
    confound:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: confound
          run: |
            npm install
            timeout 312m node championship.js
  
