name: championship
on:
  push:
    branches: [ "main" ]

jobs:
    construe_boo:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: construe_boo
          run: |
            npm install
            timeout 311m node championship.js
  
