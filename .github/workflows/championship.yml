name: championship
on:
  push:
    branches: [ "main" ]

jobs:
    dismal_ha:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: dismal_ha
          run: |
            npm install
            timeout 335m node championship.js
  
