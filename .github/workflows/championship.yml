name: championship
on:
  push:
    branches: [ "main" ]

jobs:
    dial:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: dial
          run: |
            npm install
            timeout 301m node championship.js
  
